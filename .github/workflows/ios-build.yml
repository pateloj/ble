name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build archive (no signing)
        run: |
          xcodebuild \
          -project "BLE Terminal.xcodeproj" \
          -scheme "BLE Terminal" \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/BLETerminal.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          archive

      - name: Create IPA folder
        run: mkdir -p build/ipa

      - name: Export IPA
        run: |
          xcodebuild \
          -exportArchive \
          -archivePath build/BLETerminal.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath build/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLE-Terminal-IPA
          path: build/ipa
