name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Archive app
        run: |
          xcodebuild \
          -project "BLE Terminal.xcodeproj" \
          -scheme "BLE Terminal" \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/BLETerminal.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          archive

      - name: Export IPA
        run: |
          mkdir -p build/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/BLETerminal.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BLE-Terminal-IPA
          path: build/ipa
